<!doctype html>
<html>
<head><meta charset="utf-8"><title>agentforge dev</title>
<style>
  body{font:14px system-ui;max-width:720px;margin:2rem auto;padding:0 1rem}
  #log{border:1px solid #ccc;padding:1rem;min-height:240px;white-space:pre-wrap}
  .u{color:#06c}.a{color:#111}.d{color:#690;font-size:12px}
  form{display:flex;gap:.5rem;margin-top:.5rem}input{flex:1;padding:.5rem}
</style></head>
<body>
<h2>agentforge dev</h2>
<select id="agent"></select>
<div id="log"></div>
<form id="f"><input id="msg" placeholder="Message..." autocomplete="off"><button>Send</button></form>
<script>
const log = document.getElementById('log'), sel = document.getElementById('agent')
let history = []
fetch('/_agents').then(r=>r.json()).then(a=>sel.innerHTML=a.map(n=>`<option>${n}</option>`).join(''))
function line(cls,t){const d=document.createElement('div');d.className=cls;d.textContent=t;log.appendChild(d);return d}
document.getElementById('f').onsubmit = async e => {
  e.preventDefault()
  const msg = document.getElementById('msg').value.trim(); if(!msg) return
  document.getElementById('msg').value=''
  line('u','you: '+msg)
  const res = await fetch('/'+sel.value,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({id:'dev',message:{role:'user',parts:[{text:msg}]},history})})
  const reader = res.body.getReader(), dec = new TextDecoder()
  let buf='', aLine=line('a','bot: '), answer=''
  while(true){const{done,value}=await reader.read();if(done)break
    buf+=dec.decode(value,{stream:true});const evs=buf.split('\n\n');buf=evs.pop()
    for(const ev of evs){if(!ev.startsWith('data: '))continue
      const p=JSON.parse(ev.slice(6))
      if(p.type==='text_delta'){answer+=p.content;aLine.textContent='bot: '+answer}
      else if(p.type==='data'||p.type==='file')line('d',JSON.stringify(p))
      else if(p.type==='metadata')line('d','usage: '+JSON.stringify(p.usage))}}
  history.push({role:'user',parts:[{text:msg}]},{role:'assistant',parts:[{text:answer}]})
}
</script>
</body></html>
